changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Security
      regexp: '^.*?(sec|security)(\(.+\))??!?:.+$'
      order: 3
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "Merge pull request"

release:
  github:
    owner: 1607-NetEnginee
    name: nightcrawler
  prerelease: auto
  draft: false
  header: |
    ## NIGHTCRAWLER {{ .Tag }}

    Offensive Security Framework — by 1607-NetEnginee / Cyberoutcast

    "ignored, but critical"

    **Quickstart:**
    ```bash
    curl -sSL https://raw.githubusercontent.com/1607-NetEnginee/NightCrawler/main/scripts/install.sh | bash
    ```
  footer: |
    ## Verification

    All artifacts are signed with Sigstore keyless signing:
    ```bash
    cosign verify-blob \
      --certificate-identity-regexp '.*' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      --signature checksums.txt.sig \
      checksums.txt
    sha256sum -c checksums.txt
    ```

    Docker image:
    ```bash
    cosign verify ghcr.io/1607-NetEnginee/NightCrawler:{{ .Tag }} \
      --certificate-identity-regexp '.*' \
      --certificate-oidc-issuer https://token.actions.githubusercontent.com
    ```

brews:
  - name: nightcrawler
    homepage: https://github.com/1607-NetEnginee/NightCrawler
    description: "Offensive Security Framework"
    license: Apache-2.0
    repository:
      owner: 1607-NetEnginee
      name: homebrew-tap
    commit_author:
      name: 1607-netengineee-bot
      email: bot@cyberoutcast.id
    directory: Formula
    test: |
      system "#{bin}/nightcrawler", "version"
