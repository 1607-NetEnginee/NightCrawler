version: 2

project_name: nightcrawler

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: nightcrawler
    main: ./cmd/nightcrawler
    binary: nightcrawler
    env:
      - CGO_ENABLED=0
    goos:   [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/1607-NetEnginee/NightCrawler/internal/version.Version={{.Version}}
      - -X github.com/1607-NetEnginee/NightCrawler/internal/version.Commit={{.Commit}}
      - -X github.com/1607-NetEnginee/NightCrawler/internal/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - README.id.md
      - signatures/**/*
      - configs/nightcrawler.example.yaml
      - configs/profiles/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

